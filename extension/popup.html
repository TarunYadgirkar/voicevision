<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body {
    width: 320px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 16px;
    background: #0f0f0f;
    color: #f0f0f0;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  h1 {
    margin: 0;
    font-size: 18px;
    font-weight: 700;
  }
  h1 span { color: #60a5fa; }
  button#openSiteBtn {
    border: none;
    border-radius: 8px;
    background: #1f2937;
    color: #9ca3af;
    width: 28px;
    height: 28px;
    font-size: 14px;
    cursor: pointer;
    line-height: 1;
  }
  button#openSiteBtn:hover { background: #374151; color: #f0f0f0; }
  button#micBtn {
    width: 100%;
    padding: 12px;
    font-size: 15px;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    background: #3b82f6;
    color: #fff;
    cursor: pointer;
  }
  button#micBtn:disabled { opacity: 0.6; cursor: default; }
  button#micBtn.listening { background: #ef4444; animation: pulse 1s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }
  #transcript {
    margin: 12px 0 0;
    font-size: 13px;
    color: #d1d5db;
    min-height: 18px;
  }
  #explanation {
    margin: 6px 0 0;
    font-size: 12px;
    color: #9ca3af;
    min-height: 16px;
  }
  .filters { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
  .filter-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #1f2937;
    border-radius: 10px;
    padding: 8px 10px;
  }
  .filter-label {
    font-size: 12px;
    font-weight: 600;
    color: #f0f0f0;
    flex: 0 0 auto;
    white-space: nowrap;
  }
  .filter-slider {
    flex: 1 1 auto;
    min-width: 0;
    accent-color: #3b82f6;
    height: 4px;
    cursor: pointer;
  }
  .filter-remove {
    flex: 0 0 auto;
    width: 20px;
    height: 20px;
    border: none;
    border-radius: 999px;
    background: #374151;
    color: #d1d5db;
    font-size: 12px;
    line-height: 1;
    cursor: pointer;
  }
  .filter-remove:hover { background: #ef4444; color: #fff; }
  .empty { color: #6b7280; font-size: 12px; }
  .hint { margin-top: 14px; font-size: 11px; color: #6b7280; line-height: 1.5; }
</style>
</head>
<body>
  <div class="header">
    <h1>Voice<span>Vision</span></h1>
    <button id="openSiteBtn" title="Open VoiceVision website">↗</button>
  </div>
  <button id="micBtn">🎤 Hold to Speak</button>
  <p id="transcript"></p>
  <p id="explanation"></p>
  <div id="filters" class="filters"><span class="empty">No filters active</span></div>
  <p class="hint">Try: "I have red-green colorblindness", "make it dark", "I'm light sensitive", "reset to normal"</p>
  <script src="popup.js"></script>
</body>
</html>
